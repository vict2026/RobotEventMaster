name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt pyinstaller ultralytics

      - name: Download YOLO model
        run: |
          mkdir -p models
          python -c "
          import os
          import urllib.request
          
          model_name = 'yolo11n.pt'
          url = f'https://github.com/ultralytics/assets/releases/download/v8.3.0/{model_name}'
          save_path = f'models/{model_name}'
          
          if not os.path.exists(save_path):
              print(f'Downloading {model_name}...')
              urllib.request.urlretrieve(url, save_path)
              print('Download completed!')
          else:
              print(f'{model_name} already exists.')
          "

      - name: Build with PyInstaller (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          pyinstaller --clean --onedir --console --name "RobotEventMaster" \
            --add-data "app.py:." \
            --add-data "config.py:." \
            --add-data "database:database" \
            --add-data "services:services" \
            --add-data "ui:ui" \
            --add-data "api:api" \
            --add-data "data:data" \
            --add-data "models:models" \
            --collect-all streamlit \
            --hidden-import=apscheduler \
            run.py

      - name: Build with PyInstaller (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          pyinstaller --clean --onedir --console --name "RobotEventMaster" `
            --add-data "app.py;." `
            --add-data "config.py;." `
            --add-data "database;database" `
            --add-data "services;services" `
            --add-data "ui;ui" `
            --add-data "api;api" `
            --add-data "data;data" `
            --add-data "models;models" `
            --collect-all streamlit `
            --hidden-import=apscheduler `
            run.py

      - uses: actions/upload-artifact@v4
        with:
          name: RobotEventMaster-${{ matrix.os }}
          path: dist/RobotEventMaster

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    # ✅ 新增这一段权限
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true