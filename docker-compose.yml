version: "3.9"

services:
  app:
    build: .
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://robot:robot123@db:5432/robot_event
      TZ: Asia/Shanghai
    volumes:
      - ./data:/app/data
      - ./assets:/app/assets
      - ./logs:/app/logs
      - ./models:/app/models
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: robot
      POSTGRES_PASSWORD: robot123
      POSTGRES_DB: robot_event
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U robot -d robot_event"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
